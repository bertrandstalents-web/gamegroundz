<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - GameGroundz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981',
                        primaryHover: '#059669',
                        dark: '#0f172a',
                        darker: '#020617',
                        light: '#f8fafc',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'glow': '0 0 20px rgba(16, 185, 129, 0.3)',
                    }
                }
            }
        }
    </script>
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light font-sans text-dark min-h-screen flex flex-col">

    <!-- Top Navigation -->
    <nav class="bg-white border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="flex items-center space-x-2">
                    <i class="fa-solid fa-layer-group text-primary text-3xl"></i>
                    <span class="font-bold text-2xl tracking-tight text-dark notranslate">Game<span class="text-primary">Groundz</span></span>
                </a>
                <div class="flex items-center space-x-6">
                    <a href="index.html" class="text-slate-600 hover:text-primary font-semibold transition-custom">Back to Home</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-xl w-full max-w-md p-8 border border-slate-100 relative overflow-hidden">
            <!-- Decorative blur -->
            <div class="absolute top-0 right-0 -mr-16 -mt-16 w-32 h-32 bg-primary/10 rounded-full blur-2xl z-0 pointer-events-none"></div>
            
            <div class="relative z-10">
                <div class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center text-primary text-2xl mb-6 ml-auto mr-auto">
                    <i class="fa-solid fa-key"></i>
                </div>
                
                <h1 class="text-2xl font-extrabold text-dark text-center mb-2">Forgot your password?</h1>
                <p class="text-slate-500 text-center mb-8">No worries! Enter your email and we'll send you a link to reset it.</p>
                
                <div id="form-container">
                    <form id="forgot-password-form" class="space-y-6">
                        <div>
                            <input type="email" id="email" placeholder="Email Address" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-custom text-slate-700">
                        </div>
                        
                        <button type="submit" id="submit-btn" class="w-full bg-primary hover:bg-primaryHover text-white py-3.5 rounded-xl font-bold text-lg transition-custom shadow-glow flex justify-center items-center">
                            <span id="btn-text">Send Reset Link</span>
                            <i id="btn-spinner" class="fa-solid fa-circle-notch fa-spin ml-2 hidden"></i>
                        </button>
                        
                        <div id="status-message" class="hidden text-sm font-medium text-center p-3 rounded-xl mt-4"></div>
                    </form>
                </div>
                
                <div id="success-container" class="hidden text-center py-4">
                    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center text-green-500 text-3xl mb-4 mx-auto border-4 border-white shadow-sm">
                        <i class="fa-solid fa-envelope-circle-check"></i>
                    </div>
                    <h2 class="text-xl font-bold text-dark mb-2">Check your email!</h2>
                    <p class="text-slate-600 mb-6">We've sent a password reset link to <strong id="success-email-display" class="text-dark"></strong>.</p>
                    <a href="forgot-password.html" class="text-sm font-semibold text-primary hover:text-dark transition-custom"><i class="fa-solid fa-arrow-left mr-1"></i> Try a different email</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const statusMsg = document.getElementById('status-message');
            const formContainer = document.getElementById('form-container');
            const successContainer = document.getElementById('success-container');
            const successEmailDisplay = document.getElementById('success-email-display');
            
            // UI Loading state
            submitBtn.disabled = true;
            btnText.textContent = 'Sending...';
            btnSpinner.classList.remove('hidden');
            statusMsg.classList.add('hidden');
            
            try {
                const API_BASE_URL = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
                const res = await fetch(`${API_BASE_URL}/api/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                
                statusMsg.classList.remove('hidden', 'bg-red-50', 'text-red-500');
                
                if (!res.ok) {
                    throw new Error(data.error || 'Failed to send reset link');
                }
                
                // Show success view
                formContainer.classList.add('hidden');
                successContainer.classList.remove('hidden');
                successEmailDisplay.textContent = email;
                
            } catch (err) {
                statusMsg.textContent = err.message;
                statusMsg.classList.add('bg-red-50', 'text-red-500');
                submitBtn.disabled = false;
                btnText.textContent = 'Send Reset Link';
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
    <script src="js/i18n.js"></script>
</body>
</html>
