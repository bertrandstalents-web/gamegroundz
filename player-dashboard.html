                        darker: '#020617',

                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                    }

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

        <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="window.location.href='index.html'">
                    <i class="fa-solid fa-layer-group text-primary text-3xl mr-2"></i>

                </div>
                <div class="hidden md:flex items-center space-x-6">
                    <a href="search.html" class="text-slate-600 hover:text-primary font-medium transition-custom">Find a Surface</a>

                </div>
            </div>

    </nav>

    <!-- Main Content -->

            <h1 class="text-3xl font-extrabold text-dark tracking-tight mb-2" id="dashboard-title">My Bookings</h1>
            <p class="text-slate-600">View and manage your upcoming and past facility reservations.</p>
        </div>

        <!-- Dashboard Content -->

            <!-- Sidebar Navigation -->
            <div class="lg:col-span-1">

                    <ul class="space-y-1">

                            </button>
                        </li>
                        <li>
                            <button id="nav-btn-saved" onclick="switchNav('saved')" class="w-full text-left flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-dark rounded-xl font-medium transition-custom">

                        <li>
                            <button id="nav-btn-profile" onclick="switchNav('profile')" class="w-full text-left flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-dark rounded-xl font-medium transition-custom">
                                <i class="fa-solid fa-user w-6"></i> Profile
                            </button>
                        </li>
                        <li>
                            <button class="w-full text-left flex items-center px-4 py-3 text-slate-400 cursor-not-allowed rounded-xl font-medium transition-custom">

            <!-- Content Area -->
            <div class="lg:col-span-3">
                
                <!-- Saved Section -->
                <div id="section-saved" class="hidden">
                    <div id="saved-loading" class="flex justify-center py-12">
                        <i class="fa-solid fa-spinner fa-spin text-primary text-3xl"></i>

                    <div id="saved-content" class="hidden">

                <div id="section-bookings">

                        <div id="upcoming-container" class="space-y-4 mb-8"></div>

                <!-- Profile Section -->
                <div id="section-profile" class="hidden bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                    <h2 class="text-2xl font-bold text-dark mb-6">My Profile</h2>
                    <form id="profile-form" class="space-y-6 max-w-2xl">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">First Name</label>
                                <input type="text" id="prof-first-name" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary/20 outline-none transition-custom">

                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Last Name</label>
                                <input type="text" id="prof-last-name" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary/20 outline-none transition-custom">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Email Address</label>
                            <input type="email" id="prof-email" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary/20 outline-none transition-custom">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Phone Number</label>

                        </div>

                                    <label class="block text-sm font-semibold text-slate-700 mb-1">Current Password</label>
                                    <input type="password" id="prof-old-pass" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary/20 outline-none transition-custom">
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-1">New Password</label>
                                    <input type="password" id="prof-new-pass" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary/20 outline-none transition-custom">
                                </div>
                            </div>

                        <div id="prof-msg" class="hidden p-4 rounded-xl text-sm font-medium border"></div>
                        <div class="pt-4 border-t border-slate-100 flex justify-end">
                            <button type="submit" id="prof-submit-btn" class="bg-primary hover:bg-primaryHover text-white px-8 py-3 rounded-xl font-bold transition-custom shadow-glow">
                                Save Profile
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </main>

    <script>
        function formatTimeSlots(slotsArray) {
            if (!slotsArray || slotsArray.length === 0) return '';
            
            const sorted = [...slotsArray].sort();
            let groups = [];
            let currentGroup = [sorted[0]];
            
            for (let i = 1; i < sorted.length; i++) {
                const prev = sorted[i - 1];
                const curr = sorted[i];
                
                const prevParts = prev.split(':');
                let expectedH = parseInt(prevParts[0]);
                let expectedM = parseInt(prevParts[1]) + 30;
                if (expectedM >= 60) {
                    expectedH += 1;
                    expectedM -= 60;
                }
                const expectedStr = `${expectedH.toString().padStart(2, '0')}:${expectedM.toString().padStart(2, '0')}`;
                
                if (curr === expectedStr) {
                    currentGroup.push(curr);
                } else {
                    groups.push(currentGroup);
                    currentGroup = [curr];
                }
            }
            groups.push(currentGroup);
            
            return groups.map(group => {
                const start = group[0];
                const last = group[group.length - 1];
                
                const lastParts = last.split(':');
                let endH = parseInt(lastParts[0]);
                let endM = parseInt(lastParts[1]) + 30;
                if (endM >= 60) {
                    endH += 1;
                    endM -= 60;
                }
                const endStr = `${endH.toString().padStart(2, '0')}:${endM.toString().padStart(2, '0')}`;
                
                return `${start} - ${endStr}`;
            }).join(', ');
        }

        function switchNav(section) {
            document.getElementById('section-bookings').classList.add('hidden');
            document.getElementById('section-profile').classList.add('hidden');
            document.getElementById('section-saved').classList.add('hidden');
            
            document.getElementById('nav-btn-bookings').className = 'w-full text-left flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-dark rounded-xl font-medium transition-custom';
            document.getElementById('nav-btn-profile').className = 'w-full text-left flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-dark rounded-xl font-medium transition-custom';
            document.getElementById('nav-btn-saved').className = 'w-full text-left flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-dark rounded-xl font-medium transition-custom';

            document.getElementById(`section-${section}`).classList.remove('hidden');
            document.getElementById(`nav-btn-${section}`).className = 'w-full text-left flex items-center px-4 py-3 bg-primary/10 text-primary rounded-xl font-bold transition-custom';

            if (section === 'saved' && !window.savedLoaded) {
                loadSavedSurfaces();
            }
        }

        async function loadSavedSurfaces() {
            window.savedLoaded = true;
            const loadingUI = document.getElementById('saved-loading');
            const contentUI = document.getElementById('saved-content');
            const container = document.getElementById('saved-container');
            const API_BASE_URL = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
            
            loadingUI.classList.remove('hidden');
            contentUI.classList.add('hidden');
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/saved-facilities/my`, {credentials: 'include'});
                if (res.status === 401) {
                    loadingUI.classList.add('hidden');
                    contentUI.classList.remove('hidden');
                    container.innerHTML = `
                        <div class="bg-white rounded-2xl p-8 text-center border border-slate-200">
                            <i class="fa-solid fa-lock text-4xl text-slate-300 mb-4"></i>
                            <h3 class="text-xl font-bold text-dark mb-2">Please log in</h3>
                            <a href="index.html" class="bg-primary text-white px-6 py-3 rounded-xl font-bold hover:bg-primaryHover transition-custom cursor-pointer inline-block">Go to Login</a>
                        </div>
                    `;
                    return;
                }
                
                if (!res.ok) throw new Error("Failed to load saved surfaces");
                
                const facilities = await res.json();
                loadingUI.classList.add('hidden');
                contentUI.classList.remove('hidden');
                
                if (facilities.length === 0) {
                    container.innerHTML = `
                        <div class="bg-white rounded-2xl p-8 text-center border border-slate-200">
                            <i class="fa-regular fa-bookmark text-4xl text-slate-300 mb-4"></i>
                            <h3 class="text-xl font-bold text-dark mb-2">No saved surfaces</h3>
                            <p class="text-slate-500 mb-6">You haven't saved any facilities yet.</p>
                            <a href="search.html" class="bg-dark text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-800 transition-custom inline-block">Find a Surface</a>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = '';
                facilities.forEach(f => {
                    let topImageUrl = 'https://images.unsplash.com/photo-1518605368461-1ee0ab24b829?ixlib=rb-4.0.3&w=800&q=80';
                    try {
                        const parsed = JSON.parse(f.image_url);
                        if (Array.isArray(parsed) && parsed.length > 0) topImageUrl = parsed[0];
                        else topImageUrl = f.image_url;
                    } catch(e) { topImageUrl = f.image_url || topImageUrl; }

                    const ratingStars = `<i class="fa-solid fa-star text-yellow-400 text-xs mr-1"></i> ${f.rating} <span class="text-slate-400 font-normal">(${f.reviews_count || 0})</span>`;
                    
                    container.innerHTML += `
                        <div class="bg-white border border-slate-200 rounded-2xl p-4 flex flex-col md:flex-row gap-6 hover:shadow-md transition-custom relative" id="saved-card-${f.id}">
                            <div class="w-full md:w-56 h-36 rounded-xl overflow-hidden flex-shrink-0 cursor-pointer" onclick="window.location.href='facility.html?id=${f.id}'">
                                <img src="${topImageUrl}" class="w-full h-full object-cover pb-1 transition-transform duration-500 hover:scale-105">
                            </div>
                            <div class="flex-1 flex flex-col justify-between py-1">
                                <div>
                                    <div class="flex justify-between items-start">
                                        <h3 class="text-xl font-bold text-dark mb-1 cursor-pointer hover:text-primary transition-custom notranslate" onclick="window.location.href='facility.html?id=${f.id}'">${f.name}</h3>
                                        <button onclick="unsaveFacility(${f.id})" class="text-red-500 hover:text-red-600 bg-red-50 hover:bg-red-100 w-10 h-10 rounded-full flex items-center justify-center transition-custom" title="Remove from saved">
                                            <i class="fa-solid fa-heart"></i>
                                        </button>
                                    </div>
                                    <div class="text-xs font-medium text-slate-500 mb-2">${f.subtitle || 'Premium Sports Facility'}</div>
                                    <p class="text-sm text-slate-500 mb-3"><i class="fa-solid fa-location-dot mr-1"></i> <span class="notranslate">${f.location}</span></p>
                                </div>
                                <div class="flex justify-between items-end">
                                    <div class="font-bold text-sm text-dark">${ratingStars}</div>
                                    <div class="text-lg font-extrabold text-primary">$${f.base_price || 197} <span class="text-sm font-normal text-slate-500">/ hour</span></div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
            } catch (err) {
                loadingUI.classList.add('hidden');
                contentUI.classList.remove('hidden');
                container.innerHTML = `<div class="bg-red-50 text-red-600 p-4 rounded-xl text-center font-medium">${err.message}</div>`;
            }
        }
        
        async function unsaveFacility(facilityId) {
            if (!confirm('Remove this facility from your saved surfaces?')) return;
            const API_BASE_URL = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
            try {
                const res = await fetch(`${API_BASE_URL}/api/saved-facilities/${facilityId}`, { method: 'DELETE', credentials: 'include' });
                if (res.ok) {
                    const card = document.getElementById(`saved-card-${facilityId}`);
                    if (card) card.remove();
                    const container = document.getElementById('saved-container');
                    if (container && container.children.length === 0) {
                        container.innerHTML = `
                            <div class="bg-white rounded-2xl p-8 text-center border border-slate-200">
                                <i class="fa-regular fa-bookmark text-4xl text-slate-300 mb-4"></i>
                                <h3 class="text-xl font-bold text-dark mb-2">No saved surfaces</h3>
                                <p class="text-slate-500 mb-6">You haven't saved any facilities yet.</p>
                                <a href="search.html" class="bg-dark text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-800 transition-custom inline-block">Find a Surface</a>
                            </div>
                        `;
                    }
                }
            } catch (e) {
                console.error('Error removing saved facility:', e);
            }
        }

        async function loadProfile() {
            const API_BASE_URL = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
            try {
                const res = await fetch(`${API_BASE_URL}/api/auth/me`, { credentials: 'include' });
                if (!res.ok) return;
                const data = await res.json();
                const u = data.user;
                if (!u) return;
                
                document.getElementById('dashboard-title').textContent = `Welcome, ${u.name}`;

                document.getElementById('prof-first-name').value = u.first_name || '';
                document.getElementById('prof-last-name').value = u.last_name || '';
                document.getElementById('prof-email').value = u.email || '';
                document.getElementById('prof-phone').value = u.phone_number || '';
                document.getElementById('prof-company').value = u.company_name || '';
            } catch (error) {
                console.error("Error loading profile:", error);
            }
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('prof-submit-btn');
            const msgDiv = document.getElementById('prof-msg');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Saving...';
            btn.disabled = true;
            msgDiv.classList.add('hidden');
            msgDiv.className = 'hidden p-4 rounded-xl text-sm font-medium border';
            
            const payload = {
                first_name: document.getElementById('prof-first-name').value,
                last_name: document.getElementById('prof-last-name').value,
                email: document.getElementById('prof-email').value,
                phone_number: document.getElementById('prof-phone').value,
                company_name: document.getElementById('prof-company').value,
                old_password: document.getElementById('prof-old-pass').value,
                new_password: document.getElementById('prof-new-pass').value
            };

            const API_BASE_URL = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
            try {
                const res = await fetch(`${API_BASE_URL}/api/users/profile`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    credentials: 'include'
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to update profile');
                
                msgDiv.textContent = 'Profile updated successfully!';
                msgDiv.classList.add('bg-green-50', 'text-green-700', 'border-green-200');
                msgDiv.classList.remove('hidden');
                
                document.getElementById('prof-old-pass').value = '';
                document.getElementById('prof-new-pass').value = '';

                const updatedName = payload.first_name.trim() + ' ' + payload.last_name.trim();
                document.getElementById('dashboard-title').textContent = `Welcome, ${updatedName}`;
                
                const storedUser = localStorage.getItem('user');
                if (storedUser) {
                    try {
                        const userObj = JSON.parse(storedUser);
                        userObj.name = updatedName;
                        userObj.email = payload.email;
                        localStorage.setItem('user', JSON.stringify(userObj));
                    } catch(e) {}
                }
            } catch (err) {
                msgDiv.textContent = err.message;
                msgDiv.classList.add('bg-red-50', 'text-red-700', 'border-red-200');
                msgDiv.classList.remove('hidden');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const loadingUI = document.getElementById('bookings-loading');
            const contentUI = document.getElementById('bookings-content');
            const upContainer = document.getElementById('upcoming-container');
            const pastContainer = document.getElementById('past-container');
            
            loadProfile();

            try {
                const API_BASE_URL = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
                
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('success') === 'true' && urlParams.get('session_id')) {
                    try {
                        await fetch(`${API_BASE_URL}/api/bookings/confirm`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ session_id: urlParams.get('session_id') })
                        });
                        // Remove URL params cleanly
                        window.history.replaceState({}, document.title, window.location.pathname);
                    } catch(err) {
                        console.error('Confirmation error', err);
                    }
                }

                const response = await fetch(`${API_BASE_URL}/api/bookings/my`, {credentials: 'include'});
                
                loadingUI.classList.add('hidden');
                
                if (response.status === 401) {
                    contentUI.classList.remove('hidden');
                    upContainer.innerHTML = `
                        <div class="bg-white rounded-2xl p-8 text-center border border-slate-200">
                            <i class="fa-solid fa-lock text-4xl text-slate-300 mb-4"></i>
                            <h3 class="text-xl font-bold text-dark mb-2">Please log in</h3>
                            <p class="text-slate-500 mb-6">You need to be logged in to view your bookings.</p>
                            <a href="index.html" class="bg-primary text-white px-6 py-3 rounded-xl font-bold hover:bg-primaryHover transition-custom cursor-pointer inline-block">Go to Login</a>
                        </div>
                    `;
                    return;
                }

                if (!response.ok) throw new Error("Failed to fetch bookings");
                const bookings = await response.json();

                contentUI.classList.remove('hidden');

                if (bookings.length === 0) {
                    upContainer.innerHTML = `
                        <div class="bg-white rounded-2xl p-8 text-center border border-slate-200">
                            <i class="fa-solid fa-calendar-xmark text-4xl text-slate-300 mb-4"></i>
                            <h3 class="text-xl font-bold text-dark mb-2">No bookings yet</h3>
                            <p class="text-slate-500 mb-6">You haven't booked any sports surfaces yet. When you do, they will appear here.</p>
                            <a href="search.html" class="bg-dark text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-800 transition-custom inline-block">Find a Surface</a>
                        </div>
                    `;
                    pastContainer.innerHTML = `<p class="text-slate-500 text-sm">No past bookings found.</p>`;
                    return;
                }

                upContainer.innerHTML = '';
                pastContainer.innerHTML = '';
                
                function getPrimaryImageUrl(urlStr) {
                    try {
                        const parsed = JSON.parse(urlStr);
                        if (Array.isArray(parsed) && parsed.length > 0) return parsed[0];
                    } catch (e) {}
                    return urlStr || 'https://images.unsplash.com/photo-1518605368461-1ee0ab24b829?ixlib=rb-4.0.3&auto=format&fit=crop&w=1400&q=80';
                }

                const today = new Date();
                today.setHours(0, 0, 0, 0);

                let upcomingCount = 0;
                let pastCount = 0;

                bookings.forEach(booking => {
                    let dateObj;
                    try {
                        const parts = booking.booking_date.split('T')[0].split('-');
                        dateObj = new Date(parts[0], parts[1] - 1, parts[2]);
                    } catch(e) {
                        dateObj = new Date(booking.booking_date);
                    }
                    const isPast = dateObj < today;
                    
                    const formattedDate = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });
                    
                    let parsedSlots = [];
                    try {
                        parsedSlots = typeof booking.time_slots === 'string' ? JSON.parse(booking.time_slots) : booking.time_slots;
                    } catch(e) {}
                    
                    let timeDisplay = "Time TBD";
                    if (Array.isArray(parsedSlots) && parsedSlots.length > 0) {
                        timeDisplay = formatTimeSlots(parsedSlots);
                    }

                    const htmlStr = `
                        <div class="bg-white border border-slate-200 rounded-2xl p-5 flex flex-col md:flex-row gap-6 hover:shadow-md transition-custom ${isPast ? 'opacity-80' : ''}">
                            <div class="w-full md:w-48 h-32 rounded-xl overflow-hidden flex-shrink-0 relative">
                                <img src="${getPrimaryImageUrl(booking.image_url)}" class="w-full h-full object-cover">
                                <div class="absolute top-2 left-2 bg-white/90 px-2 py-1 rounded text-xs font-bold shadow-sm">
                                    <span class="text-${isPast ? 'slate' : 'primary'} uppercase tracking-wide">${booking.status}</span>
                                </div>
                            </div>
                            <div class="flex-1 flex flex-col justify-between">
                                <div>
                                    <h3 class="text-xl font-bold text-dark mb-1 cursor-pointer hover:text-primary transition-custom" onclick="window.location.href='facility.html?id=${booking.facility_id}'">${booking.facility_name}</h3>
                                    <p class="text-sm text-slate-500 mb-3"><i class="fa-solid fa-location-dot mr-1"></i> ${booking.location}</p>
                                    
                                    <div class="flex flex-wrap gap-4 text-sm font-medium text-slate-700">
                                        <div class="bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-100"><i class="fa-regular fa-calendar mr-2 text-slate-400"></i>${formattedDate}</div>
                                        <div class="bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-100"><i class="fa-regular fa-clock mr-2 text-slate-400"></i>${timeDisplay}</div>
                                    </div>
                                </div>
                            </div>
                            <div class="flex flex-col justify-between items-end min-w-[120px] pt-2 md:pt-0 border-t md:border-t-0 md:border-l border-slate-100 md:pl-6">
                                <div class="text-xl font-extrabold text-dark">$${booking.total_price ? booking.total_price.toFixed(2) : '197.00'}</div>
                                <div class="flex flex-col gap-2 w-full mt-4 md:mt-0">
                                    <button onclick="window.open('receipt.html?id=${booking.id}', '_blank')" class="w-full text-center text-sm font-bold text-${isPast ? 'slate' : 'primary'} hover:text-${isPast ? 'dark' : 'primaryHover'} border border-${isPast ? 'slate' : 'primary'}/20 bg-${isPast ? 'slate' : 'primary'}/5 hover:bg-${isPast ? 'slate' : 'primary'}/10 py-2 rounded-lg transition-custom">Receipt</button>
                                </div>
                            </div>
                        </div>
                    `;

                    if (isPast) {
                        pastContainer.innerHTML += htmlStr;
                        pastCount++;
                    } else {
                        upContainer.innerHTML += htmlStr;
                        upcomingCount++;
                    }
                });

                if (upcomingCount === 0) {
                    upContainer.innerHTML = `<p class="text-slate-500 text-sm italic py-4">No upcoming reservations found.</p>`;
                }
                if (pastCount === 0) {
                    pastContainer.innerHTML = `<p class="text-slate-500 text-sm italic py-4">No past bookings found.</p>`;
                }

            } catch (error) {
                loadingUI.classList.add('hidden');
                upContainer.innerHTML = `<div class="bg-red-50 text-red-600 p-4 rounded-xl text-center font-medium">${error.message}</div>`;
            }

            // Logout handling
            const logoutBtn = document.getElementById('nav-logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    if(confirm("Are you sure you want to log out?")) {
                        const API_BASE_URL = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
                        await fetch(`${API_BASE_URL}/api/auth/logout`, {method: 'POST', credentials: 'omit'});
                        localStorage.removeItem('user');
                        window.location.href = 'index.html';
                    }
                });
            }
        });
    </script>
    <script src="js/i18n.js"></script>
</body>
</html>
