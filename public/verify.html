<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - GameGroundz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981',
                        primaryHover: '#059669',
                        dark: '#0f172a',
                        darker: '#020617',
                        light: '#f8fafc',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light font-sans text-dark min-h-screen flex flex-col">

    <!-- Top Navigation -->
    <nav class="bg-white border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="flex items-center space-x-2">
                    <i class="fa-solid fa-layer-group text-primary text-3xl"></i>
                    <span class="font-bold text-2xl tracking-tight text-dark notranslate">Game<span class="text-primary">Groundz</span></span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-xl w-full max-w-md p-8 border border-slate-100 relative overflow-hidden text-center">
            <div id="status-icon" class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 text-4xl mb-6 mx-auto">
                <i class="fa-solid fa-circle-notch fa-spin"></i>
            </div>
            
            <h1 id="status-title" class="text-2xl font-bold text-dark mb-4">Verifying...</h1>
            <p id="status-desc" class="text-slate-600 mb-8">Please wait while we verify your email address.</p>
            
            <a href="index.html?login=true" id="action-btn" class="hidden inline-flex items-center justify-center w-full bg-primary hover:bg-primaryHover text-white py-3.5 rounded-xl font-bold transition-custom shadow-glow text-lg">
                Log In Now
            </a>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const status = urlParams.get('status');
            
            const iconContainer = document.getElementById('status-icon');
            const title = document.getElementById('status-title');
            const desc = document.getElementById('status-desc');
            const btn = document.getElementById('action-btn');
            
            if (status === 'success') {
                iconContainer.className = 'w-20 h-20 bg-green-100 rounded-full flex items-center justify-center text-green-500 text-4xl mb-6 mx-auto';
                iconContainer.innerHTML = '<i class="fa-solid fa-check"></i>';
                title.textContent = 'Email Verified!';
                desc.textContent = 'Your email address has been successfully verified. You can now log in to your account.';
                btn.classList.remove('hidden');
            } else if (status === 'expired') {
                iconContainer.className = 'w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center text-yellow-500 text-4xl mb-6 mx-auto';
                iconContainer.innerHTML = '<i class="fa-solid fa-clock"></i>';
                title.textContent = 'Link Expired';
                desc.textContent = 'This verification link has expired. Please request a new one.';
            } else if (status === 'invalid' || status === 'error') {
                iconContainer.className = 'w-20 h-20 bg-red-100 rounded-full flex items-center justify-center text-red-500 text-4xl mb-6 mx-auto';
                iconContainer.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                title.textContent = 'Verification Failed';
                desc.textContent = 'The verification link is invalid or an error occurred. Please try again.';
            } else {
                iconContainer.className = 'w-20 h-20 bg-red-100 rounded-full flex items-center justify-center text-red-500 text-4xl mb-6 mx-auto';
                iconContainer.innerHTML = '<i class="fa-solid fa-question"></i>';
                title.textContent = 'Unknown Status';
                desc.textContent = 'Something went wrong processing your verification.';
            }
        });
    </script>
</body>
</html>
