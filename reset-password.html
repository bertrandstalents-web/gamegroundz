<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - GameGroundz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981',
                        primaryHover: '#059669',
                        dark: '#0f172a',
                        darker: '#020617',
                        light: '#f8fafc',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'glow': '0 0 20px rgba(16, 185, 129, 0.3)',
                    }
                }
            }
        }
    </script>
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light font-sans text-dark min-h-screen flex flex-col">

    <!-- Top Navigation -->
    <nav class="bg-white border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="flex items-center space-x-2">
                    <i class="fa-solid fa-layer-group text-primary text-3xl"></i>
                    <span class="font-bold text-2xl tracking-tight text-dark notranslate">Game<span class="text-primary">Groundz</span></span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-xl w-full max-w-md p-8 border border-slate-100 relative overflow-hidden">
            <!-- Decorative blur -->
            <div class="absolute top-0 right-0 -mr-16 -mt-16 w-32 h-32 bg-primary/10 rounded-full blur-2xl z-0 pointer-events-none"></div>
            
            <div id="reset-content" class="relative z-10">
                <div class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center text-primary text-2xl mb-6 ml-auto mr-auto">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                
                <h1 class="text-2xl font-extrabold text-dark text-center mb-2">Create New Password</h1>
                <p class="text-slate-500 text-center mb-8">Your new password must be securely formed with at least 8 characters, 1 number, and 1 uppercase letter.</p>
                
                <form id="reset-password-form" class="space-y-4">
                    <div class="relative">
                        <input type="password" id="new-password" placeholder="New Password" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-custom text-slate-700 pr-12">
                        <button type="button" id="toggle-new-password" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 transition-custom focus:outline-none">
                            <i class="fa-solid fa-eye" id="toggle-new-icon"></i>
                        </button>
                    </div>
                    
                    <div class="relative">
                        <input type="password" id="confirm-password" placeholder="Confirm New Password" required class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-custom text-slate-700 pr-12">
                        <button type="button" id="toggle-confirm-password" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 transition-custom focus:outline-none">
                            <i class="fa-solid fa-eye" id="toggle-confirm-icon"></i>
                        </button>
                    </div>
                    
                    <button type="submit" id="submit-btn" class="w-full bg-primary hover:bg-primaryHover text-white py-3.5 rounded-xl font-bold text-lg transition-custom shadow-glow flex justify-center items-center mt-6">
                        <span id="btn-text">Reset Password</span>
                        <i id="btn-spinner" class="fa-solid fa-circle-notch fa-spin ml-2 hidden"></i>
                    </button>
                    
                    <div id="status-message" class="hidden text-sm font-medium text-center p-3 rounded-xl mt-4"></div>
                </form>
            </div>
            
            <div id="success-content" class="relative z-10 hidden text-center py-6">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center text-green-500 text-4xl mb-6 mx-auto">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h2 class="text-2xl font-bold text-dark mb-4">Password Reset!</h2>
                <p class="text-slate-600 mb-8">Your password has been successfully updated. You can now log in using your new password.</p>
                <a href="index.html?login=true" class="inline-flex items-center justify-center w-full bg-primary hover:bg-primaryHover text-white py-3.5 rounded-xl font-bold transition-custom shadow-glow text-lg">
                    Log In Now
                </a>
            </div>
        </div>
    </main>

    <script>
        // Password visibility toggles
        document.getElementById('toggle-new-password').addEventListener('click', () => {
            const input = document.getElementById('new-password');
            const icon = document.getElementById('toggle-new-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
        
        document.getElementById('toggle-confirm-password').addEventListener('click', () => {
            const input = document.getElementById('confirm-password');
            const icon = document.getElementById('toggle-confirm-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // Form submission
        document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const statusMsg = document.getElementById('status-message');
            
            statusMsg.classList.add('hidden');
            
            if (!token) {
                statusMsg.textContent = "Invalid or missing token link.";
                statusMsg.classList.remove('hidden');
                statusMsg.classList.add('bg-red-50', 'text-red-500');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                statusMsg.textContent = "Passwords do not match.";
                statusMsg.classList.remove('hidden');
                statusMsg.classList.add('bg-red-50', 'text-red-500');
                return;
            }
            
            const passwordRegex = /^(?=.*[A-Z])(?=.*\d).{8,}$/;
            if (!passwordRegex.test(newPassword)) {
                statusMsg.textContent = "Password must be at least 8 characters long, and contain at least 1 number and 1 uppercase letter.";
                statusMsg.classList.remove('hidden');
                statusMsg.classList.add('bg-red-50', 'text-red-500');
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            
            submitBtn.disabled = true;
            btnText.textContent = 'Resetting...';
            btnSpinner.classList.remove('hidden');
            
            try {
                const API_BASE_URL = (window.location.protocol === 'file:') ? 'http://localhost:3000' : '';
                const res = await fetch(`${API_BASE_URL}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: newPassword })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.error || 'Failed to reset password');
                }
                
                // Show success view
                document.getElementById('reset-content').classList.add('hidden');
                document.getElementById('success-content').classList.remove('hidden');
                
            } catch (err) {
                statusMsg.textContent = err.message;
                statusMsg.classList.remove('hidden');
                statusMsg.classList.add('bg-red-50', 'text-red-500');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Reset Password';
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
    <script src="js/i18n.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('gg_user') || localStorage.getItem('user');
            if (userStr) {
                try {
                    const u = JSON.parse(userStr);
                    const puckDashboard = document.getElementById('puck-dashboard');
                    const puckProfile = document.getElementById('puck-profile');
                    if (u.role === 'host') {
                        if (puckDashboard) puckDashboard.href = 'owner-dashboard.html';
                        if (puckProfile) {
                            puckProfile.href = 'owner-dashboard.html#profile';
                            puckProfile.removeAttribute('onclick');
                        }
                    } else if (u.role === 'admin') {
                        if (puckDashboard) puckDashboard.href = 'admin-dashboard.html';
                        if (puckProfile) {
                            puckProfile.href = 'admin-dashboard.html';
                            puckProfile.removeAttribute('onclick');
                        }
                    } else {
                        if (puckDashboard) puckDashboard.href = 'player-dashboard.html';
                        if (puckProfile) puckProfile.href = 'player-dashboard.html#profile';
                    }
                } catch(e) {}
            }
        });
    </script>

    <!-- Dynamically update puck links based on user role -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('gg_user') || localStorage.getItem('user');
            if (userStr) {
                try {
                    const u = JSON.parse(userStr);
                    const puckDashboard = document.getElementById('puck-dashboard');
                    const puckProfile = document.getElementById('puck-profile');
                    if (u.role === 'host') {
                        if (puckDashboard) puckDashboard.href = 'owner-dashboard.html';
                        if (puckProfile) {
                            puckProfile.href = 'owner-dashboard.html#profile';
                            puckProfile.removeAttribute('onclick');
                        }
                    } else if (u.role === 'admin') {
                        if (puckDashboard) puckDashboard.href = 'admin-dashboard.html';
                        if (puckProfile) {
                            puckProfile.href = 'admin-dashboard.html';
                            puckProfile.removeAttribute('onclick');
                        }
                    } else {
                        if (puckDashboard) puckDashboard.href = 'player-dashboard.html';
                        if (puckProfile) {
                            puckProfile.href = 'player-dashboard.html#profile';
                            puckProfile.removeAttribute('onclick');
                        }
                    }
                } catch(e) {}
            }
        });
    </script>
</body>
</html>
